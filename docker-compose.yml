services:
  intellitrail:
    image: intellitrail:latest
    container_name: intellitrail
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9100:8000"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
